name: Glog.AI SCA Scan - JavaScript / TypeScript

on: 
  workflow_dispatch:

permissions:
  contents: write
  packages: read
  security-events: write
  issues: write

jobs:
  glog-sca:
    runs-on: ubuntu-latest

    env:
      # Large vulnerability database — application + OS advisories
      GLOG_DEPSCAN_VDB_VOLUME: glog-depscan-vdb-full
      VDB_APP_ONLY: "false"
      VDB_HOME: /vdb
      VDB_DATABASE_URL: ghcr.io/appthreat/vdbxz-10y:v6
      VDB_AGE_HOURS: "168"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout glog-action
        uses: actions/checkout@v4
        with:
          repository: glogai/glog-action
          token: ${{ secrets.PAT_TOKEN }}
          path: .github/glog-action
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate lockfile if missing
        run: |
          if [ ! -f package.json ]; then
            echo "No package.json found — skipping lockfile generation"
            exit 0
          fi

          if [ -f yarn.lock ]; then
            echo "yarn.lock present — verifying with yarn install --frozen-lockfile"
            npm install -g yarn --silent
            yarn install --frozen-lockfile --ignore-scripts || yarn install --ignore-scripts
          elif [ -f pnpm-lock.yaml ]; then
            echo "pnpm-lock.yaml present — verifying with pnpm install --frozen-lockfile"
            npm install -g pnpm --silent
            pnpm install --frozen-lockfile --ignore-scripts || pnpm install --ignore-scripts
          elif [ -f package-lock.json ]; then
            echo "package-lock.json present — running npm ci"
            npm ci --ignore-scripts || npm install --ignore-scripts
          else
            echo "No lockfile found — generating package-lock.json via npm install"
            npm install --ignore-scripts --package-lock-only
          fi

      - name: Run Glog.AI SCA
        uses: ./.github/glog-action
        with:
          lang: 'javascript,oss'
          client: 'test'
          env: 'dev'
          upload: 'true'
          debug: 'true'
          github-token: ${{ secrets.PAT_TOKEN }}
          glog-token: ${{ secrets.GLOG_TOKEN }}
